# ==========================================
#  Iris 自动构建 & 发布
#
#  触发条件：
#  1. push 以 v* 开头的 tag（如 v1.0.0）→ 自动创建 Release 并上传产物 + 发布到 npm
#  2. 手动触发 workflow_dispatch → 可选是否发布（需填写版本号）
#
#  构建方式：
#  使用 bun build --compile 为每个平台编译独立二进制。
#  产物包含主程序、onboard 配置引导、Web UI 静态资源和默认配置模板。
#
#  分发渠道：
#  1. GitHub Release：解压即用的二进制 tar.gz / zip
#  2. npm：irises 包装器包 + irises-* 平台二进制包
# ==========================================

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: '是否发布到 GitHub Release 和 npm'
        type: boolean
        default: false
        required: false
      version:
        description: '发布版本号（仅 publish 勾选时需要，如 v1.0.0）'
        type: string
        default: ''
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-latest
          - platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - platform: darwin
            arch: arm64
            runner: macos-latest
          - platform: darwin
            arch: x64
            runner: macos-latest
            cross: true
          - platform: windows
            arch: x64
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Web UI dependencies
        working-directory: src/platforms/web/web-ui
        run: npm ci

      - name: Build Web UI
        run: npm run build:ui

      - name: Build binary (cross-compile)
        if: matrix.cross == true
        run: bun run build:compile -- --target ${{ matrix.platform }}-${{ matrix.arch }}

      - name: Build binary (native)
        if: matrix.cross != true
        run: bun run build:compile -- --single

      - name: Archive (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          cd dist/bin/iris-${{ matrix.platform }}-${{ matrix.arch }}
          tar czf "$GITHUB_WORKSPACE/iris-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" .
          echo "Archive size: $(du -sh $GITHUB_WORKSPACE/iris-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz | cut -f1)"

      - name: Archive (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/bin/iris-windows-${{ matrix.arch }}\*" -DestinationPath "iris-windows-${{ matrix.arch }}.zip"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: iris-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            iris-*.tar.gz
            iris-*.zip
          retention-days: 30

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-iris-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/bin/iris-${{ matrix.platform }}-${{ matrix.arch }}/
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.version }}"
            if [[ -z "$TAG" ]]; then
              echo "::error::手动发布时必须填写版本号（如 v1.0.0）"
              exit 1
            fi
            # 补全 v 前缀
            if [[ "$TAG" != v* ]]; then
              TAG="v${TAG}"
            fi
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "手动触发，使用版本号: ${TAG}"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "Tag 触发，使用: ${GITHUB_REF#refs/tags/}"
          fi

      - name: Create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}" -m "Release ${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: iris-*
          merge-multiple: false

      - name: Prepare release files
        run: |
          mkdir -p release/
          find artifacts/ -name '*.tar.gz' -o -name '*.zip' | while read f; do
            cp "$f" release/
          done
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: release/*

  publish-npm:
    name: Publish to npm
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Download npm package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/bin/
          pattern: npm-iris-*
          merge-multiple: false

      - name: Flatten artifact directories
        run: |
          cd dist/bin
          for d in npm-iris-*/; do
            pkg_name=$(basename "$d" | sed 's/^npm-//')
            if [ ! -d "$pkg_name" ]; then
              mv "$d" "$pkg_name"
            fi
          done
          rm -rf npm-iris-*
          ls -la

      - name: Publish
        run: bun run script/publish.ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
