# ==========================================
#  Iris 自动构建 & 发布
#
#  触发条件：
#  1. push 以 v* 开头的 tag（如 v1.0.0）→ 自动创建 Release 并上传产物
#  2. 手动触发 workflow_dispatch（仅构建，不发 Release）
#
#  产物：
#  - iris-linux-x64.tar.gz       包含 Iris 主体 + onboard TUI
#  - iris-linux-arm64.tar.gz     包含 Iris 主体 + onboard TUI
#
#  安装后用户只需一个包，iris start / iris onboard 都开箱可用。
# ==========================================

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Iris (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            bun-target: bun-linux-x64
          - arch: arm64
            runner: ubuntu-24.04-arm
            bun-target: bun-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      # ── 构建 Iris 主体 ────────────────────
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install web-ui dependencies
        working-directory: src/platforms/web/web-ui
        run: npm ci

      - name: Build web-ui
        run: bun run build:ui

      - name: TypeScript compile
        run: bun run tsc -p tsconfig.build.json

      # ── 构建 Onboard TUI（当前架构）────────
      - name: Install onboard dependencies
        working-directory: onboard
        run: bun install --frozen-lockfile

      - name: Build onboard binary
        working-directory: onboard
        run: |
          mkdir -p dist
          bun build src/index.tsx --compile \
            --target=${{ matrix.bun-target }} \
            --outfile dist/iris-onboard-linux-${{ matrix.arch }} \
            --minify
          ls -lh dist/

      # ── 打包 tarball（主体 + onboard 一体）───
      - name: Prepare release tarball
        run: |
          RELEASE_DIR="iris-linux-${{ matrix.arch }}"
          mkdir -p "$RELEASE_DIR/bin"

          # Iris 运行时文件
          cp -r dist/                         "$RELEASE_DIR/"
          cp -r data/configs.example/         "$RELEASE_DIR/data/configs.example/"
          cp -r deploy/                       "$RELEASE_DIR/deploy/"
          cp -r src/platforms/web/web-ui/dist/ "$RELEASE_DIR/src/platforms/web/web-ui/dist/" 2>/dev/null || true
          cp    package.json                  "$RELEASE_DIR/"
          cp    bun.lock                      "$RELEASE_DIR/"
          cp    README.md                     "$RELEASE_DIR/"

          # 提示词模板
          mkdir -p "$RELEASE_DIR/src/prompt/templates"
          cp -r src/prompt/templates/ "$RELEASE_DIR/src/prompt/templates/" 2>/dev/null || true

          # Onboard 二进制
          cp onboard/dist/iris-onboard-linux-${{ matrix.arch }} "$RELEASE_DIR/bin/iris-onboard"
          chmod +x "$RELEASE_DIR/bin/iris-onboard"

          # 仅安装生产依赖（排除 devDependencies）
          cd "$RELEASE_DIR" && bun install --production --frozen-lockfile && cd ..

          # 清理不必要文件
          rm -rf "$RELEASE_DIR/node_modules/.cache"
          rm -f  "$RELEASE_DIR/bun.lock"
          find "$RELEASE_DIR/node_modules" -name "*.ts" -not -name "*.d.ts" -delete 2>/dev/null || true
          find "$RELEASE_DIR/node_modules" -name "*.map" -delete 2>/dev/null || true
          find "$RELEASE_DIR/node_modules" -type d -name "__tests__" -exec rm -rf {} + 2>/dev/null || true
          find "$RELEASE_DIR/node_modules" -type d -name "test" -exec rm -rf {} + 2>/dev/null || true
          find "$RELEASE_DIR/node_modules" -type d -name "docs" -exec rm -rf {} + 2>/dev/null || true

          tar czf "iris-linux-${{ matrix.arch }}.tar.gz" "$RELEASE_DIR"
          echo "Tarball size: $(du -sh iris-linux-${{ matrix.arch }}.tar.gz | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iris-linux-${{ matrix.arch }}
          path: iris-linux-${{ matrix.arch }}.tar.gz
          retention-days: 30

  # ── 发布 Release ─────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release/
          cp artifacts/iris-linux-x64/*.tar.gz    release/
          cp artifacts/iris-linux-arm64/*.tar.gz   release/
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
