# ==========================================
#  AI Chat 配置文件示例
#  复制此文件为 config.yaml 并填入实际值
# ==========================================

# LLM 配置（三层路由）
# primary: 用户主对话（必填）
# secondary: 工具循环后续轮次（可选，未配置回退到 primary）
# light: 辅助任务（可选，未配置回退到 secondary → primary）
llm:
  primary:
    # 提供商: gemini | openai-compatible | claude
    provider: gemini
    apiKey: your-api-key-here
    model: gemini-2.0-flash
    baseUrl: https://generativelanguage.googleapis.com

  # secondary:
  #   provider: openai-compatible
  #   apiKey: your-api-key-here
  #   model: gpt-4o
  #   baseUrl: https://api.openai.com

  # light:
  #   provider: gemini
  #   apiKey: your-api-key-here
  #   model: gemini-2.0-flash
  #   baseUrl: https://generativelanguage.googleapis.com

# 平台配置
platform:
  # 类型: console | discord | telegram
  type: console

  discord:
    token: your-discord-bot-token

  telegram:
    token: your-telegram-bot-token

  web:
    port: 8192
    # 127.0.0.1 = 仅本机访问（配合 Nginx 反代使用，推荐）
    # 0.0.0.0   = 允许所有网络接口访问（本地开发/无反代时使用）
    host: 127.0.0.1
    # API 全局认证令牌（可选，未配置时不启用）
    # 配置后请求 /api/* 需携带 Authorization: Bearer <token>
    # authToken: your-secret-token-here
    # 管理接口认证令牌（推荐）
    # 配置后 /api/config、/api/deploy/*、/api/cloudflare/* 需携带 X-Management-Token
    # managementToken: your-management-token-here

# 存储配置
storage:
  # 类型: json-file
  type: json-file

  # 会话数据目录
  dir: ./data/sessions

# 系统配置
system:
  # 系统提示词（留空则使用默认）
  systemPrompt: ""

  # 工具执行最大轮次
  maxToolRounds: 10

  # 流式输出
  stream: true

  # 子代理最大嵌套深度（默认 3）
  # maxAgentDepth: 3

# 记忆配置（可选）
# memory:
#   enabled: true
#   dbPath: ./data/memory.db

