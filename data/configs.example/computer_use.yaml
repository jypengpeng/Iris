# Computer Use 配置
#
# 启用后，LLM 可通过一组预定义工具操控浏览器或桌面环境。
# 工具包括 click_at、type_text_at、scroll_document、navigate 等，
# 走普通 function calling 路径，任何支持工具调用的模型均可使用。
#
# 依赖：浏览器环境需要安装 Playwright
#   npm install playwright
#   npx playwright install chromium

# 是否启用（默认关闭）
enabled: false

# 执行环境
#   browser — Playwright 控制 Chromium 浏览器（当前可用）
#   screen  — 桌面级截屏 + 输入模拟（计划中）
environment: browser

# 屏幕 / 浏览器视口尺寸（像素）
# Gemini 推荐 1440×900 以获得最佳效果
screenWidth: 1440
screenHeight: 900

# 排除的预定义函数（不注册为工具的操作）
# 取消注释可禁用特定操作
# excludedFunctions:
#   - drag_and_drop

# ─── 浏览器环境专用 ───

# 启动时打开的初始页面
initialUrl: https://www.google.com

# 搜索引擎首页（search 工具导航的目标）
# searchEngineUrl: https://www.google.com

# 是否无头模式（不显示浏览器窗口）
# 调试时建议关闭，以便观察操作过程
headless: false

# 是否在操作位置显示红色圆圈标记（调试用）
# highlightMouse: true

# ─── 截图保留策略 ───
#
# 发送给 LLM 时，只保留最近 N 轮 Computer Use 工具交互中的截图。
# 超出的旧轮次截图会被自动剥离，以节省 token。
# 存储中的完整截图不受影响。
#
# 默认 3，与 Gemini 官方示例一致。
# 设为 0 表示不保留任何截图（仅保留 URL 等文本信息）。
# 不设置或注释掉则使用默认值 3。
maxRecentScreenshots: 3
