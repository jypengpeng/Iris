# 工具配置
#
# ─── 全局审批开关（最高优先级） ───
#
# 全部自动批准（跳过一类 + 二类审批）
# autoApproveAll: true
#
# 仅跳过一类审批（Y/N 确认），二类审批（diff 预览）仍生效
# autoApproveConfirmation: true
#
# 仅跳过二类审批（diff 预览），一类审批（Y/N 确认）仍生效
# autoApproveDiff: true
#
# ─── 按工具配置执行策略 ───
#
# 下方按工具名称配置执行策略。
# 未配置的工具默认需要手动确认。
#
# autoApprove: true  -> 工具调用后直接执行
# autoApprove: false -> 工具执行前需要手动确认

# 只读工具：默认直接执行
read_file:
  autoApprove: true
search_in_files:
  autoApprove: true
  # 如需对 mode: replace 打开 diff 审批页，可改为 false，并开启 showApprovalView
  showApprovalView: true
find_files:
  autoApprove: true
list_files:
  autoApprove: true

# 修改类工具：默认需要确认
write_file:
  autoApprove: false
  # Console TUI 中是否打开 diff 审批视图；设为 false 时退回到底部 Y/N 确认提示
  showApprovalView: true
apply_diff:
  autoApprove: false
  # Console TUI 中是否打开 diff 审批视图；设为 false 时退回到底部 Y/N 确认提示
  showApprovalView: true
insert_code:
  autoApprove: false
  showApprovalView: true
delete_code:
  autoApprove: false
  showApprovalView: true
delete_file:
  autoApprove: false
create_directory:
  autoApprove: false

# ─────────────────────────────────────────────────────────────
# Shell 工具配置
# ─────────────────────────────────────────────────────────────
#
# 除了 autoApprove 开关外，shell 工具还支持细粒度的命令模式匹配：
#
#   allowPatterns — 白名单：匹配的命令自动执行（即使 autoApprove: false）
#   denyPatterns  — 黑名单：匹配的命令必须确认（即使 autoApprove: true）
#
# 判定优先级：denyPatterns > allowPatterns > autoApprove
#
# 支持的模式语法：
#   - 精确匹配：  "git status"              仅匹配该完整命令
#   - 通配符 *：  "git log *"               匹配 git log 后跟任意参数
#   - 通配符 ?：  "ls -?"                   匹配 ls 后跟单字母选项
#   - 前缀匹配：  "npm run *"               匹配所有 npm run 子命令
#   - 正则表达式："/^cat\s+\S+$/"           以 / 包裹按正则解析
#
# ── 用法示例 ──
#
#   场景 A：默认拒绝，仅放行指定命令（推荐）
#     autoApprove: false
#     allowPatterns:
#       - "git status*"
#       - "ls *"
#
#   场景 B：默认放行，拦截危险命令
#     autoApprove: true
#     denyPatterns:
#       - "rm *"
#       - "/sudo\s+/"
#
#   场景 C：混合使用（白名单 + 黑名单 + 兜底）
#     autoApprove: false
#     allowPatterns:
#       - "git *"
#     denyPatterns:
#       - "git push *"          # 虽然 git * 在白名单，但 push 被黑名单拦截
#
shell:
  autoApprove: false

  # ── 白名单（取消注释以启用） ──
  allowPatterns:
    # 只读 / 查看类
    # - "ls *"                    # 列出文件
    # - "cat *"                   # 查看文件内容
    # - "head *"                  # 查看文件开头
    # - "tail *"                  # 查看文件结尾
    # - "wc *"                    # 统计行数/字数
    # - "which *"                 # 查找命令路径
    # - "echo *"                  # 输出信息
    # - "pwd"                     # 当前目录
    # - "env"                     # 查看环境变量
    #
    # 搜索类
    # - "grep *"                  # 搜索文本
    # - "find *"                  # 查找文件
    # - "rg *"                    # ripgrep 搜索
    # - "fd *"                    # fd 查找
    #
    # Git 只读操作
    # - "git status*"             # 状态查看
    # - "git log *"               # 日志查看
    # - "git diff*"               # 差异查看
    # - "git branch*"             # 分支查看
    # - "git show *"              # 查看提交
    # - "git remote -v"           # 查看远程
    #
    # 包管理器（只读）
    # - "npm list*"               # 查看依赖
    # - "npm run *"               # 运行脚本
    # - "bun run *"               # bun 运行脚本
    #
    # 自定义正则
    # - "/^(node|bun|npx|tsx)\\s+/"  # 允许 node/bun/npx/tsx 命令

  # ── 黑名单（取消注释以启用） ──
  denyPatterns:
    # 危险操作
    # - "rm -rf *"                # 递归强制删除
    # - "/^sudo\\s+/"             # 所有 sudo 命令
    # - "/^chmod\\s+/"            # 修改权限
    # - "/^chown\\s+/"            # 修改所有者
    # - "dd *"                    # 磁盘操作
    # - "/\\|\\s*sh/"             # 管道到 sh 执行
    # - "curl * | *"              # curl 管道执行
    #
    # Git 危险操作
    # - "git push *"              # 推送
    # - "git reset --hard*"       # 硬重置
    # - "git clean -fd*"          # 强制清理
    #
    # 包管理器写操作
    # - "npm install*"            # 安装依赖
    # - "npm publish*"            # 发布包

sub_agent:
  autoApprove: false

# ─────────────────────────────────────────────────────────────
# Computer Use 工具配置（需在 computer_use.yaml 中启用）
# ─────────────────────────────────────────────────────────────
#
# 以下工具在 computer_use.yaml 的 enabled: true 时自动注册。
# 所有坐标参数均为 0-999 归一化值，由工具内部转换为实际像素。
#
# 只读 / 低风险操作：建议自动批准
# open_web_browser:
#   autoApprove: true
# click_at:
#   autoApprove: true
# hover_at:
#   autoApprove: true
# scroll_document:
#   autoApprove: true
# scroll_at:
#   autoApprove: true
# go_back:
#   autoApprove: true
# go_forward:
#   autoApprove: true
# search:
#   autoApprove: true
# navigate:
#   autoApprove: true
# wait_5_seconds:
#   autoApprove: true
#
# 输入类操作：按需决定是否自动批准
# type_text_at:
#   autoApprove: true
# key_combination:
#   autoApprove: false          # 按键组合可能触发系统级操作，建议手动确认
# drag_and_drop:
#   autoApprove: false

# 如需启用其他工具（记忆、MCP 等），请按工具名补充配置。
# 例如：
# memory_search:
#   autoApprove: true
# mcp__my_server__my_tool:
#   autoApprove: false
