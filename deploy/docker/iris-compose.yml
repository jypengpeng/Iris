# ============================================================
# Iris — Docker Compose (用户部署用)
#
# 使用方式：
#   1. 下载本文件和 iris.env.example
#   2. cp iris.env.example .env    # 按需修改环境变量
#   3. docker compose up -d        # 启动
#   4. 编辑 LLM API Key:
#      docker compose exec iris vi /data/configs/llm.yaml
#   5. docker compose restart      # 重启生效
#
# Computer Use（含浏览器自动化）：
#   docker compose --profile computer-use up -d iris-computer-use
# ============================================================

services:
  iris:
    image: ghcr.io/lianues/iris:latest
    container_name: iris
    restart: unless-stopped
    ports:
      - "${IRIS_PORT:-8192}:8192"
    volumes:
      - iris-data:/data
    environment:
      NODE_ENV: production
      IRIS_DATA_DIR: /data
      IRIS_PLATFORM: ${IRIS_PLATFORM:-web}
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8192"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  iris-computer-use:
    image: ghcr.io/lianues/iris:computer-use
    container_name: iris-cu
    restart: unless-stopped
    profiles:
      - computer-use
    ports:
      - "${IRIS_PORT:-8192}:8192"
    volumes:
      - iris-data:/data
    environment:
      NODE_ENV: production
      IRIS_DATA_DIR: /data
      IRIS_PLATFORM: ${IRIS_PLATFORM:-web}
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8192"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  iris-data:
    driver: local
